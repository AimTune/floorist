name: Publish to npm

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  publish:
    name: Build · Publish
    runs-on: ubuntu-latest
    # Trusted publishing via OIDC — no NPM_TOKEN secret required.
    # The npm package "floorist" is configured to trust this repo + workflow.
    # The `environment:` below makes the GitHub OIDC token carry an
    # `environment: NPM_TOKEN` claim so its `sub` becomes
    # `repo:AimTune/floorist:environment:NPM_TOKEN`, matching the
    # "Environment name: NPM_TOKEN" field on the npm Trusted Publisher.
    # The GitHub Environment named "NPM_TOKEN" must exist under
    # Settings → Environments (no secrets required inside it).
    # https://docs.npmjs.com/trusted-publishers
    environment: NPM_TOKEN
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      # OIDC trusted publishing requires npm CLI ≥ 11.5 — Node 22 ships with
      # npm 10, so bump it explicitly before invoking publish.
      - name: Upgrade npm to a version that supports OIDC publishing
        run: npm install -g npm@latest

      - run: npm ci

      - name: Build + tests + coverage
        run: npm run build

      - name: Sanity-check package contents
        run: npm pack --dry-run

      - name: Publish (OIDC trusted publisher)
        run: npm publish --access public --provenance
