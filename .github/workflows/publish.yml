name: Publish to npm

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  publish:
    name: Build · Publish
    runs-on: ubuntu-latest
    # Trusted publishing via OIDC — no NPM_TOKEN secret required.
    # The npm package "floorist" is configured to trust this repo + workflow.
    # The `environment:` below makes the GitHub OIDC token carry an
    # `environment: NPM_TOKEN` claim so its `sub` becomes
    # `repo:AimTune/floorist:environment:NPM_TOKEN`, matching the
    # "Environment name: NPM_TOKEN" field on the npm Trusted Publisher.
    # The GitHub Environment named "NPM_TOKEN" must exist under
    # Settings → Environments (no secrets required inside it).
    # https://docs.npmjs.com/trusted-publishers
    environment: NPM_TOKEN
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      # OIDC trusted publishing requires npm CLI ≥ 11.5 — Node 22 ships with
      # npm 10, so bump it explicitly before invoking publish.
      - name: Upgrade npm to a version that supports OIDC publishing
        run: npm install -g npm@latest

      - run: npm ci

      - name: Build + tests + coverage
        run: npm run build

      - name: Sanity-check package contents
        run: npm pack --dry-run

      # Diagnostic: print the OIDC token's `sub`/claim shape so we can compare
      # it against the npm Trusted Publisher config. Safe — only claims, no
      # signature is printed. Remove once publishing is stable.
      - name: Debug — print OIDC token claims (no signature)
        run: |
          TOKEN=$(curl -sS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm:registry.npmjs.org" \
            | python3 -c "import json,sys;print(json.load(sys.stdin)['value'])")
          CLAIMS_B64=$(echo -n "$TOKEN" | cut -d. -f2)
          # base64url → base64 (pad)
          PAD=$(( 4 - ${#CLAIMS_B64} % 4 ))
          if [ $PAD -lt 4 ]; then CLAIMS_B64="${CLAIMS_B64}$(printf '=%.0s' $(seq 1 $PAD))"; fi
          CLAIMS_B64=$(echo -n "$CLAIMS_B64" | tr '_-' '/+')
          echo "$CLAIMS_B64" | base64 -d | python3 -c "
          import json, sys
          c = json.load(sys.stdin)
          want = ['sub', 'aud', 'repository', 'repository_owner', 'workflow', 'workflow_ref', 'environment', 'ref', 'ref_type', 'event_name']
          print('--- OIDC claims that the npm Trusted Publisher matches against ---')
          for k in want:
              print(f'  {k}: {c.get(k)!r}')
          print()
          print('Trusted publisher must match (case-sensitive):')
          print(f'  repository == {c.get(\"repository\")!r}  (npm config: aimtune/floorist)')
          print(f'  environment == {c.get(\"environment\")!r}  (npm config: NPM_TOKEN)')
          print(f'  workflow file in workflow_ref == publish.yml')
          "

      - name: Publish (OIDC trusted publisher)
        run: npm publish --access public --provenance
