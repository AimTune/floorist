name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel older runs for the same branch so PR pushes don't pile up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build · Test · Coverage
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Node 22+ is required for `--test-coverage-include`/`--exclude`. The
        # published library is browser-only — consumer Node version doesn't matter.
        node: ['22', '24']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dev dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Tests with coverage
        run: npm run test:cov

      - name: Update README coverage block
        if: matrix.node == '22'
        run: node ./scripts/coverage-readme.mjs

      - name: Upload coverage (LCOV)
        if: matrix.node == '22'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage.lcov
          if-no-files-found: error

      - name: Upload dist
        if: matrix.node == '22'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          if-no-files-found: error
